name: Go Test on Push

on:
  push:
    branches:
      - master
    paths:
      - "*/**"
      - go.*
      - "!.github/**"
      - "!dev/**"
      - "!tmp/**"

jobs:
  go-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "stable"

      - name: Test
        run: go test -json ./... > test.json

      - name: Annotate tests
        if: always()
        uses: guyarb/golang-test-annotations@v0.9.0
        with:
          test-results: test.json
