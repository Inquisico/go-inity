name: Release Drafter

on:
  push:
    branches:
      - main
    paths-ignore:
      - ".github/**"

permissions:
  contents: write
  pull-requests: read

jobs:
  update_release_draft:
    runs-on: ubuntu-latest

    steps:
      - name: Draft release
        uses: release-drafter/release-drafter@v7
        id: release_drafter
